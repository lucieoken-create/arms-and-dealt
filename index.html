<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Arms & Dealt — Elite recruitment for those with the right assets. We deal in arms." />
    <title>Arms & Dealt</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!--
      Hidden form for Netlify build-time detection.
      Required because this is a React SPA — Netlify's crawler reads static
      HTML, not JS-rendered output, so it won't find the form in Apply.jsx.
      This form must mirror every field name in the live React form exactly.
    -->
    <form name="recruitment" data-netlify="true" hidden>
      <input type="text"   name="codename" />
      <input type="text"   name="preferredArm" />
      <input type="text"   name="suit" />
      <input type="text"   name="whyJoin" />
      <input type="text"   name="howHeard" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
